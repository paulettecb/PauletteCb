<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & shadow" subtitle="Generous rounding, soft periwinkle-tinted shadows" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:22px 24px;color:var(--text-primary);display:flex;gap:36px;}
  .group{display:flex;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:58px;height:58px;background:var(--periwinkle-100);border:1.5px solid var(--periwinkle-300);}
  .sh{width:58px;height:58px;background:var(--white);border-radius:var(--radius-md);}
  .n{font-size:10px;color:var(--text-secondary);font-weight:600;}
  .h{font-size:11px;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--text-muted);align-self:flex-start;margin-bottom:4px;width:100%;}
  .sec{display:flex;flex-direction:column;}
</style></head><body>
  <div class="sec">
    <div class="h">Radius</div>
    <div class="group">
      <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm 10</div></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md 16</div></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg 24</div></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl 32</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="h">Shadow</div>
    <div class="group">
      <div class="col"><div class="sh" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
      <div class="col"><div class="sh" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div></div>
      <div class="col"><div class="sh" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
    </div>
  </div>
</body></html>
