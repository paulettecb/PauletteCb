<!-- @dsCard group="Colors" viewport="700x170" name="Pastel accents" subtitle="Whimsy palette — accents & illustration only, never dominant" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:20px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;display:flex;flex-direction:column;}
  .chip{height:64px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xs);}
  .n{font-size:11px;color:var(--text-secondary);margin-top:8px;font-weight:600;}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .note{margin-top:14px;font-size:11px;color:var(--text-muted);font-style:italic;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pastel-blush)"></div><div class="n">Blush</div><div class="h">#F6D2DD</div></div>
    <div class="sw"><div class="chip" style="background:var(--pastel-peach)"></div><div class="n">Peach</div><div class="h">#F8DCC9</div></div>
    <div class="sw"><div class="chip" style="background:var(--pastel-butter)"></div><div class="n">Butter</div><div class="h">#F6EBC4</div></div>
    <div class="sw"><div class="chip" style="background:var(--pastel-mint)"></div><div class="n">Mint</div><div class="h">#CFE8DA</div></div>
    <div class="sw"><div class="chip" style="background:var(--pastel-sky)"></div><div class="n">Sky</div><div class="h">#CFE0F2</div></div>
    <div class="sw"><div class="chip" style="background:var(--pastel-lilac)"></div><div class="n">Lilac</div><div class="h">#E2D6F0</div></div>
  </div>
  <div class="note">Use one pastel per surface as a soft fill (tags, cards, illustration). Keep periwinkle &amp; neutrals in charge.</div>
</body></html>
