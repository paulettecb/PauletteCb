<!-- @dsCard group="Colors" viewport="700x150" name="Periwinkle scale" subtitle="The brand base — 500 is primary" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:20px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;display:flex;flex-direction:column;}
  .chip{height:64px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xs);}
  .n{font-size:11px;color:var(--text-secondary);margin-top:8px;font-weight:600;}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .star{outline:2px solid var(--ink-900);outline-offset:2px;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--periwinkle-50)"></div><div class="n">50</div><div class="h">#F0F2FB</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-100)"></div><div class="n">100</div><div class="h">#E2E6F5</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-200)"></div><div class="n">200</div><div class="h">#C9D0ED</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-300)"></div><div class="n">300</div><div class="h">#AEB8E2</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-400)"></div><div class="n">400</div><div class="h">#9BA6DA</div></div>
    <div class="sw"><div class="chip star" style="background:var(--periwinkle-500)"></div><div class="n">500 ★</div><div class="h">#8795D2</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-600)"></div><div class="n">600</div><div class="h">#6B7AC1</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-700)"></div><div class="n">700</div><div class="h">#5562A4</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-800)"></div><div class="n">800</div><div class="h">#434D80</div></div>
    <div class="sw"><div class="chip" style="background:var(--periwinkle-900)"></div><div class="n">900</div><div class="h">#2F3658</div></div>
  </div>
</body></html>
