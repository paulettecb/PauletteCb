<!-- @dsCard group="Brand" viewport="700x200" name="Premium-whimsy principle" subtitle="Quiet backbone, one spark — the 90/10 rule" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:24px;color:var(--text-primary);}
  .bar{display:flex;height:26px;border-radius:var(--radius-pill);overflow:hidden;box-shadow:var(--shadow-xs);}
  .premium{flex:0 0 90%;background:var(--periwinkle-500);display:flex;align-items:center;padding-left:16px;color:#fff;font-size:12px;font-weight:600;}
  .spark{flex:1;background:var(--pop-magenta);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px;}
  .col h4{margin:0 0 6px;font-size:12px;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--text-secondary);}
  .col p{margin:0;font-size:13px;line-height:1.5;color:var(--text-muted);}
</style></head><body>
  <div class="bar">
    <div class="premium">90% &nbsp;Premium &amp; calm</div>
    <div class="spark">10% Whimsy</div>
  </div>
  <div class="grid">
    <div class="col"><h4>The 90% — premium</h4><p>Farmhouse serif, Hanken sans, warm neutrals, generous white space, restrained periwinkle. Clean and uncluttered.</p></div>
    <div class="col"><h4>The 10% — whimsy</h4><p>One spark per view: a Friendship word, the heart, a single pastel fill, a charm. Delight without noise.</p></div>
  </div>
</body></html>
