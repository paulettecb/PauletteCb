<!-- @dsCard group="Type" viewport="700x260" name="Premium-whimsy pairing" subtitle="Hanken does the work; Friendship + Farmhouse are the sparks" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>@font-face{font-family:'FarmhouseLocal';src:url('../assets/fonts/Farmhouse.otf') format('opentype');}</style>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--oat);padding:28px 30px;color:var(--text-primary);}
  .topline{display:flex;align-items:baseline;gap:14px;}
  .eyebrow{font-size:12px;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--periwinkle-700);font-weight:600;}
  .flourish{font-family:'FarmhouseLocal','Georgia',serif;font-size:20px;color:var(--periwinkle-600);}
  h1{font-family:var(--font-heading);font-weight:800;font-size:42px;line-height:1.04;letter-spacing:-0.025em;margin:12px 0 0;color:var(--ink-900);}
  h1 .spark{font-family:var(--font-display);font-weight:500;color:var(--periwinkle-500);}
  .body{font-size:16px;line-height:var(--leading-relaxed);color:var(--ink-700);max-width:520px;margin:14px 0 0;}
  .legend{display:flex;gap:18px;margin-top:18px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;}
  .legend i{font-style:normal;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
</style></head><body>
  <div class="topline">
    <span class="eyebrow">Handmade dog walk gear</span>
    <span class="flourish">Est. 2024</span>
  </div>
  <h1>Every walk is an <span class="spark">adventure</span> worth gearing up for.</h1>
  <p class="body">Original biothane and solid brass — strong, waterproof, and made to look as good as it lasts.</p>
  <div class="legend">
    <i><span class="dot" style="background:var(--ink-900)"></span>Hanken headline &amp; body</i>
    <i><span class="dot" style="background:var(--periwinkle-500)"></span>One Friendship spark word</i>
    <i><span class="dot" style="background:var(--periwinkle-600)"></span>Farmhouse flourish (rare)</i>
  </div>
</body></html>
