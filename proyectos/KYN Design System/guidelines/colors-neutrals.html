<!-- @dsCard group="Colors" viewport="700x150" name="Warm neutrals" subtitle="Off-whites & inks, lightly periwinkle-tilted" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:20px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;display:flex;flex-direction:column;}
  .chip{height:64px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xs);border:1px solid var(--ink-100);}
  .n{font-size:11px;color:var(--text-secondary);margin-top:8px;font-weight:600;}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="n">White</div><div class="h">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="n">Paper</div><div class="h">#FBFAF7</div></div>
    <div class="sw"><div class="chip" style="background:var(--oat)"></div><div class="n">Oat</div><div class="h">#F4F0E8</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand)"></div><div class="n">Sand</div><div class="h">#E9E3D7</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300)"></div><div class="n">Ink 300</div><div class="h">#A8A6B0</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="n">Ink 500</div><div class="h">#75737F</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="n">Ink 700</div><div class="h">#4A4955</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="n">Ink 900</div><div class="h">#2A2933</div></div>
  </div>
</body></html>
