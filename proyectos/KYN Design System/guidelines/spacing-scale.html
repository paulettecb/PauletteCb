<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · use tokens for all gaps & padding" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:22px 24px;color:var(--text-primary);}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--periwinkle-300);border-radius:4px;width:22px;}
  .n{font-size:10px;color:var(--text-secondary);font-weight:600;}
  .px{font-size:9px;color:var(--text-muted);}
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="px">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="px">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="px">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="px">16</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="n">5</div><div class="px">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="n">6</div><div class="px">32</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="n">7</div><div class="px">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="n">8</div><div class="px">64</div></div>
  </div>
</body></html>
