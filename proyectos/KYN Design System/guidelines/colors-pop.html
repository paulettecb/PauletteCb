<!-- @dsCard group="Colors" viewport="700x180" name="The pop — magenta" subtitle="From the logo heart. One small moment per view." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>@font-face{font-family:'FarmhouseLocal';src:url('../assets/fonts/Farmhouse.otf') format('opentype');}</style>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:20px;display:flex;gap:24px;align-items:center;}
  .swatches{display:flex;gap:8px;}
  .sw{display:flex;flex-direction:column;}
  .chip{width:96px;height:80px;border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);}
  .n{font-size:11px;color:var(--text-secondary);margin-top:8px;font-weight:600;}
  .h{font-size:10px;color:var(--text-muted);font-variant-numeric:tabular-nums;}
  .demo{flex:1;display:flex;flex-direction:column;gap:10px;}
  .pill{align-self:flex-start;background:var(--pop-magenta);color:#fff;font-family:'FarmhouseLocal','Georgia',serif;font-size:24px;line-height:1;padding:7px 22px;border-radius:var(--radius-pill);}
  .btn{align-self:flex-start;background:var(--periwinkle-500);color:#fff;font-weight:600;font-size:13px;padding:10px 18px;border-radius:var(--radius-pill);}
  .cap{font-size:11px;color:var(--text-muted);font-style:italic;}
</style></head><body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--pop-magenta)"></div><div class="n">Pop</div><div class="h">#E85DA0</div></div>
    <div class="sw"><div class="chip" style="background:var(--pop-magenta-soft)"></div><div class="n">Pop soft</div><div class="h">#F7C9DE</div></div>
  </div>
  <div class="demo">
    <span class="pill">&#xF00E;ew dro&#xF02A;</span>
    <span class="btn">Shop the set</span>
    <span class="cap">Reserve magenta for a single highlight — a badge, a heart, a sale tag. Periwinkle stays the action color.</span>
  </div>
</body></html>
