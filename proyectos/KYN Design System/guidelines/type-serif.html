<!-- @dsCard group="Type" viewport="700x210" name="Farmhouse — signature script" subtitle="Rare flourishes: monograms, marks, name signatures, swashes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>@font-face{font-family:'FarmhouseLocal';src:url('../assets/fonts/Farmhouse.otf') format('opentype');}</style>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--paper);padding:24px;color:var(--text-primary);}
  .lbl{font-size:11px;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--text-muted);}
  .examples{display:flex;align-items:baseline;gap:28px;flex-wrap:wrap;margin:14px 0 6px;}
  .accent{font-family:'FarmhouseLocal','Georgia',serif;color:var(--periwinkle-600);}
  .meta{font-size:11px;color:var(--text-muted);margin-top:12px;font-style:italic;max-width:520px;}
</style></head><body>
  <div class="lbl">Farmhouse · Signature script — the flourish</div>
  <div class="examples">
    <span class="accent" style="font-size:44px;">Daisy</span>
    <span class="accent" style="font-size:40px;">Est. 2024</span>
    <span class="accent" style="font-size:40px;color:var(--pop-magenta);">New&nbsp;♥</span>
  </div>
  <div class="meta">A second spark — a handwritten signature for a pet name, a date, an edition mark. Beautiful but low-legibility, so never use it for body or running headlines. Swash alternates live in the PUA (see the swash library card).</div>
</body></html>
