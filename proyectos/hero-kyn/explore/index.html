<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon-kyn.svg" />
        <title>KYN — Explore the System</title>
    <style>
      html,
      body {
        margin: 0;
        background: #101113;
      }
    </style>
      <script src="../assets/kyn-localization.js"></script>
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <script>
      (async function renderExploreSystem() {
        const app = document.getElementById('app');
        try {
          const routePrefix = '/proyectos/hero-kyn/';
          const repoBase = window.location.pathname.includes(routePrefix)
            ? `${window.location.pathname.split(routePrefix)[0]}/`
            : '/';

          const response = await fetch(`${repoBase}proyectos/hero-kyn/ExploreSystem.vue`);
          const source = (await response.text()).split('/proyectos/hero-kyn/').join(`${repoBase}proyectos/hero-kyn/`);
          const templateMatch = source.match(/<template>[\s\S]*?<\/template>/);
          const styleMatch = source.match(/<style scoped>[\s\S]*?<\/style>/);

          if (!templateMatch || !styleMatch) {
            throw new Error('Unable to parse ExploreSystem.vue');
          }

          const template = templateMatch[0]
            .replace('<template>', '')
            .replace('</template>', '')
            .trim();
          const styles = styleMatch[0].replace('<style scoped>', '').replace('</style>', '').trim();

          const styleTag = document.createElement('style');
          styleTag.textContent = styles;
          document.head.appendChild(styleTag);

          app.innerHTML = template;
          window.kynLocalizeRenderedTemplate?.({ root: app });

          document.addEventListener('click', (event) => {
            const routeLink = event.target.closest('a[data-route]');
            if (!routeLink) return;
            event.preventDefault();
            const route = routeLink.getAttribute('data-route');
            const basePath = `${repoBase}proyectos/hero-kyn/`;
            window.location.href = route === '/'
              ? basePath
              : route === '/explore'
                ? `${basePath}explore/`
                : `${basePath}modularity/`;
          });
        } catch (error) {
          app.innerHTML =
            '<p style="color:#F4F0E8;font-family:&#39;Neue Haas Grotesk KYN&#39;,&#39;Neue Haas Grotesk&#39;,sans-serif;padding:24px;">Unable to load ExploreSystem.vue preview.</p>';
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
