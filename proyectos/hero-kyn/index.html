<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KYN Hero Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        background: #101113;
      }
    </style>
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <script>
      (async function renderHero() {
        const app = document.getElementById('app');
        try {
          const response = await fetch('../../HeroKyn.vue');
          const source = await response.text();
          const templateMatch = source.match(/<template>[\s\S]*?<\/template>/);
          const styleMatch = source.match(/<style scoped>[\s\S]*?<\/style>/);

          if (!templateMatch || !styleMatch) {
            throw new Error('Unable to parse HeroKyn.vue');
          }

          const template = templateMatch[0]
            .replace('<template>', '')
            .replace('</template>', '')
            .trim();
          const styles = styleMatch[0].replace('<style scoped>', '').replace('</style>', '').trim();

          const styleTag = document.createElement('style');
          styleTag.textContent = styles;
          document.head.appendChild(styleTag);

          app.innerHTML = template;
        } catch (error) {
          app.innerHTML =
            '<p style="color:#F4F0E8;font-family:Manrope,sans-serif;padding:24px;">Unable to load HeroKyn.vue preview.</p>';
          console.error(error);
        }
      })();
    </script>
  </body>
</html>
