      function getBrowserLocale() {
        const browserLocales = [
          ...(navigator.languages || []),
          navigator.language,
          Intl.DateTimeFormat().resolvedOptions().locale
        ].filter(Boolean);

        const supportsSpanish = browserLocales.some((locale) => locale.toLowerCase().startsWith('es'));
        return supportsSpanish ? 'es' : defaultLocale;
      }

      function localizeRenderedTemplate() {
        const app = document.getElementById('app');
        const locale = getBrowserLocale();
        const dictionary = localizedCopy[locale] || {};

        document.documentElement.lang = locale;

        const shouldSkipTextNode = (node) => {
          const parentTag = node.parentElement?.tagName;
          return parentTag === 'SCRIPT' || parentTag === 'STYLE';
        };

        const translate = (text) => dictionary[text.trim()];

        const walker = document.createTreeWalker(app, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          const node = walker.currentNode;
          if (shouldSkipTextNode(node)) continue;

          const originalText = node.textContent;
          const translatedText = translate(originalText || '');
          if (!translatedText) continue;

          const leadingSpace = (originalText.match(/^\s*/) || [''])[0];
          const trailingSpace = (originalText.match(/\s*$/) || [''])[0];
          node.textContent = `${leadingSpace}${translatedText}${trailingSpace}`;
        }

        app.querySelectorAll('[aria-label]').forEach((element) => {
          const translatedAriaLabel = translate(element.getAttribute('aria-label') || '');
          if (translatedAriaLabel) {
            element.setAttribute('aria-label', translatedAriaLabel);
          }
        });
      }

      function getCurrentRoute() {
        const normalizedPath = window.location.pathname.endsWith('/')
          ? window.location.pathname
          : `${window.location.pathname}/`;

        if (normalizedPath.endsWith('/modularity/')) return '/modularity';
        if (normalizedPath.endsWith('/explore/')) return '/explore';
        if (normalizedPath.endsWith('/material-intelligence/')) return '/material-intelligence';
        return '/';
      }

      async function renderRoute() {
        const app = document.getElementById('app');
        const route = getCurrentRoute();

        try {
          const response = await fetch(routes[route]);
          const source = (await response.text()).split('/proyectos/hero-kyn/').join(`${repoBase}proyectos/hero-kyn/`);
          const templateMatch = source.match(/<template>[\s\S]*?<\/template>/);
          const styleMatch = source.match(/<style scoped>[\s\S]*?<\/style>/);

          if (!templateMatch || !styleMatch) {
            throw new Error('Unable to parse page component.');
          }

          const template = templateMatch[0]
            .replace('<template>', '')
            .replace('</template>', '')
            .trim();
          const styles = styleMatch[0].replace('<style scoped>', '').replace('</style>', '').trim();

          document.querySelectorAll('[data-route-style]').forEach((node) => node.remove());
          const styleTag = document.createElement('style');
          styleTag.setAttribute('data-route-style', route);
          styleTag.textContent = styles;
          document.head.appendChild(styleTag);

          app.innerHTML = template;
          localizeRenderedTemplate();
        } catch (error) {
          app.innerHTML =
            '<p style="color:#F4F0E8;font-family:&#39;Neue Haas Grotesk KYN&#39;,&#39;Neue Haas Grotesk&#39;,sans-serif;padding:24px;">Unable to load KYN page preview.</p>';
          console.error(error);
        }
      }

      function navigate(path) {
        if (!routes[path]) return;

        const projectBasePath = `${repoBase}proyectos/hero-kyn/`;
        const targetPath = path === '/'
          ? projectBasePath
          : path === '/explore'
            ? `${projectBasePath}explore/`
            : path === '/modularity'
              ? `${projectBasePath}modularity/`
              : `${projectBasePath}material-intelligence/`;
        history.pushState({}, '', targetPath);
        renderRoute();
      }

      document.addEventListener('click', (event) => {
        const routeLink = event.target.closest('a[data-route]');
        if (routeLink) {
          event.preventDefault();
          navigate(routeLink.getAttribute('data-route'));
          return;
        }

        const backButton = event.target.closest('[data-back="true"]');
        if (backButton) {
          event.preventDefault();
          history.back();
        }
      });

      window.addEventListener('popstate', renderRoute);

      renderRoute();
    </script>
