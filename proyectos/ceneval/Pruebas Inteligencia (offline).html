  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;

    // events at the element — warn only; real JS errors carry message/error.

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker

    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded

    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque

      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

        (/^file:/.test(e.origin) && window.origin === 'null')

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });

        console.error('Failed to decode asset ' + uuid + ':', err);

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {

    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5-1b4bd488fd25\") format('opentype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   KYN · Color tokens\n   Base = periwinkle. Neutrals = warm, lightly periwinkle-tilted.\n   Whimsy = pastels + one magenta \"pop\", used sparingly.\n   ============================================================ */\n\n:root {\n  /* ---- Brand periwinkle scale (500 = brand) ---- */\n  --periwinkle-50:  #F0F2FB;\n  --periwinkle-100: #E2E6F5;\n  --periwinkle-200: #C9D0ED;\n  --periwinkle-300: #AEB8E2;\n  --periwinkle-400: #9BA6DA;\n  --periwinkle-500: #8795D2;  /* brand primary */\n  --periwinkle-600: #6B7AC1;\n  --periwinkle-700: #5562A4;\n  --periwinkle-800: #434D80;\n  --periwinkle-900: #2F3658;\n\n  /* ---- Warm neutrals (slight periwinkle tilt) ---- */\n  --white:    #FFFFFF;\n  --paper:    #FBFAF7;  /* default page surface */\n  --oat:      #F4F0E8;  /* warm section background */\n  --sand:     #E9E3D7;  /* hairlines / dividers on oat */\n  --ink-900:  #2A2933;  /* primary text */\n  --ink-700:  #4A4955;\n  --ink-500:  #75737F;  /* muted text */\n  --ink-300:  #A8A6B0;  /* disabled / faint */\n  --ink-100:  #E4E2E6;  /* borders on paper */\n\n  /* ---- Whimsy: the pop (hand-drawn heart magenta) ---- */\n  --pop-magenta:      #E85DA0;\n  --pop-magenta-soft: #F7C9DE;\n\n  /* ---- Whimsy: soft pastels (accents only) ---- */\n  --pastel-blush:  #F6D2DD;\n  --pastel-peach:  #F8DCC9;\n  --pastel-butter: #F6EBC4;\n  --pastel-mint:   #CFE8DA;\n  --pastel-sky:    #CFE0F2;\n  --pastel-lilac:  #E2D6F0;\n\n  /* ---- Semantic aliases ---- */\n  --surface-page:      var(--paper);\n  --surface-section:   var(--oat);\n  --surface-card:      var(--white);\n  --surface-brand:     var(--periwinkle-500);\n  --surface-brand-soft:var(--periwinkle-50);\n\n  --text-primary:   var(--ink-900);\n  --text-secondary: var(--ink-700);\n  --text-muted:     var(--ink-500);\n  --text-on-brand:  var(--white);\n  --text-accent:    var(--periwinkle-700);\n\n  --border-subtle: var(--ink-100);\n  --border-on-oat: var(--sand);\n  --border-strong: var(--periwinkle-200);\n\n  --accent-pop:    var(--pop-magenta);\n\n  /* ---- Functional ---- */\n  --success: #4FA47A;\n  --warning: #D9A441;\n  --danger:  #D9534F;\n  --focus-ring: var(--periwinkle-500);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   KYN · Typography tokens\n   Roles:\n   - Hanken      -> --font-sans / --font-heading  (headlines, subheads, product\n                    names, prices, body, UI — the premium workhorse)\n   - Farmhouse   -> --font-accent (= --font-serif)  RARE special accents ONLY\n                    (a \"since\" flourish, a hot tag). Hard to read in bulk.\n   - Friendship  -> --font-display  (logo + ONE spark word, sparingly)\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-display: 'Friendship', 'Comic Sans MS', cursive;\n  --font-serif:   'Farmhouse', 'Georgia', serif;\n  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-heading: var(--font-sans);   /* headlines & product names use the sans */\n  --font-accent:  var(--font-serif);  /* Farmhouse — rare flourish only */\n\n  /* Type scale (1.250 major-third-ish, tuned) */\n  --text-xs:   0.75rem;   /* 12 */\n  --text-sm:   0.875rem;  /* 14 */\n  --text-base: 1rem;      /* 16 */\n  --text-md:   1.125rem;  /* 18 */\n  --text-lg:   1.375rem;  /* 22 */\n  --text-xl:   1.75rem;   /* 28 */\n  --text-2xl:  2.25rem;   /* 36 */\n  --text-3xl:  3rem;      /* 48 */\n  --text-4xl:  4rem;      /* 64 */\n  --text-5xl:  5.5rem;    /* 88 — display hero */\n\n  /* Weights (Hanken) */\n  --weight-light:    300;\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n  --weight-black:    900;   /* headings 3xl/xl + buttons */\n\n  /* Line heights */\n  --leading-tight:   1.08;\n  --leading-snug:    1.2;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow:0.18em;  /* uppercase serif/sans eyebrows */\n}\n\n/* ------------------------------------------------------------\n   Casing rules (KYN):\n   - Headings at 3xl (48) & xl (28): ALL-CAPS + --weight-black (900).\n   - Buttons: ALL-CAPS + --weight-black, Hanken.\n   - Farmhouse accents: ALWAYS all-lowercase so leading & trailing\n     swash glyphs can attach.\n   - Long hero heads (4xl/5xl) & all body: sentence case.\n   ------------------------------------------------------------ */\n<\u002Fstyle>\n<style>/* ============================================================\n   KYN · Spacing & layout tokens (4px base)\n   ============================================================ */\n\n:root {\n  --space-0:  0;\n  --space-1:  0.25rem;  /* 4  */\n  --space-2:  0.5rem;   /* 8  */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.5rem;   /* 24 */\n  --space-6:  2rem;     /* 32 */\n  --space-7:  3rem;     /* 48 */\n  --space-8:  4rem;     /* 64 */\n  --space-9:  6rem;     /* 96 */\n  --space-10: 8rem;     /* 128 */\n\n  --container-max: 1200px;\n  --container-pad: 1.5rem;\n  --section-y:     6rem;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   KYN · Effects — radius, shadow, borders, motion\n   Premium = soft, generous radii + low, diffuse shadows.\n   ============================================================ */\n\n:root {\n  /* Radius — generous & rounded (friendly, premium) */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   16px;\n  --radius-lg:   24px;\n  --radius-xl:   32px;\n  --radius-pill: 999px;\n\n  /* Shadows — soft, periwinkle-tinted, never harsh */\n  --shadow-xs: 0 1px 2px rgba(47, 54, 88, 0.06);\n  --shadow-sm: 0 2px 8px rgba(47, 54, 88, 0.07);\n  --shadow-md: 0 8px 24px rgba(47, 54, 88, 0.09);\n  --shadow-lg: 0 18px 48px rgba(47, 54, 88, 0.12);\n  --shadow-focus: 0 0 0 3px rgba(135, 149, 210, 0.35);\n\n  /* Borders */\n  --border-width: 1px;\n  --border-width-strong: 1.5px;\n\n  /* Motion — gentle, springy-but-restrained */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur-base: 220ms; /* @kind other */\n  --dur-slow: 360ms; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   KYN · Component styles\n   Token-driven classes shared by the React components and their\n   specimen cards. Imported into styles.css so consumers get them.\n   ============================================================ */\n\n/* ---------- Buttons ---------- */\n.kyn-btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:8px;\n  font-family:var(--font-sans);font-weight:var(--weight-black);\n  text-transform:uppercase;letter-spacing:0.06em;\n  border:1.5px solid transparent;border-radius:var(--radius-pill);\n  cursor:pointer;text-decoration:none;white-space:nowrap;\n  transition:background var(--dur-fast) var(--ease-out),\n             color var(--dur-fast) var(--ease-out),\n             border-color var(--dur-fast) var(--ease-out),\n             box-shadow var(--dur-base) var(--ease-out),\n             transform var(--dur-fast) var(--ease-out);\n}\n.kyn-btn:focus-visible{outline:none;box-shadow:var(--shadow-focus);}\n.kyn-btn:active{transform:translateY(1px) scale(0.99);}\n\n/* sizes */\n.kyn-btn--sm{font-size:13px;padding:9px 18px;}\n.kyn-btn--md{font-size:15px;padding:13px 26px;}\n.kyn-btn--lg{font-size:16px;padding:16px 32px;}\n\n/* variants */\n.kyn-btn--primary{background:var(--periwinkle-500);color:#fff;box-shadow:var(--shadow-sm);}\n.kyn-btn--primary:hover{background:var(--periwinkle-600);box-shadow:var(--shadow-md);}\n.kyn-btn--secondary{background:var(--white);color:var(--ink-900);border-color:var(--ink-100);}\n.kyn-btn--secondary:hover{border-color:var(--periwinkle-300);background:var(--periwinkle-50);}\n.kyn-btn--ghost{background:transparent;color:var(--periwinkle-700);}\n.kyn-btn--ghost:hover{background:var(--periwinkle-50);}\n.kyn-btn--pop{background:var(--pop-magenta);color:#fff;box-shadow:var(--shadow-sm);}\n.kyn-btn--pop:hover{filter:brightness(0.96);box-shadow:var(--shadow-md);}\n.kyn-btn[disabled],.kyn-btn--disabled{opacity:0.45;pointer-events:none;box-shadow:none;}\n.kyn-btn svg{width:1.15em;height:1.15em;}\n\n/* ---------- Icon button ---------- */\n.kyn-iconbtn{\n  display:inline-flex;align-items:center;justify-content:center;\n  background:var(--white);border:1.5px solid var(--ink-100);\n  border-radius:var(--radius-pill);cursor:pointer;color:var(--ink-700);\n  transition:all var(--dur-fast) var(--ease-out);\n}\n.kyn-iconbtn:hover{border-color:var(--periwinkle-300);color:var(--periwinkle-700);background:var(--periwinkle-50);}\n.kyn-iconbtn:focus-visible{outline:none;box-shadow:var(--shadow-focus);}\n.kyn-iconbtn--sm{width:36px;height:36px;}\n.kyn-iconbtn--md{width:44px;height:44px;}\n.kyn-iconbtn svg{width:20px;height:20px;}\n\n/* ---------- Badge / Tag ---------- */\n.kyn-badge{\n  display:inline-flex;align-items:center;gap:6px;\n  font-family:var(--font-sans);font-weight:var(--weight-bold);\n  font-size:11px;letter-spacing:0.06em;text-transform:uppercase;\n  padding:5px 12px;border-radius:var(--radius-pill);line-height:1;white-space:nowrap;\n}\n.kyn-badge--pop{background:var(--pop-magenta);color:#fff;font-family:var(--font-accent);font-size:18px;letter-spacing:0;text-transform:none;font-weight:400;padding:6px 14px;}\n.kyn-badge--brand{background:var(--periwinkle-500);color:#fff;}\n.kyn-badge--soft{background:var(--periwinkle-100);color:var(--periwinkle-800);}\n.kyn-badge--blush{background:var(--pastel-blush);color:#9B4D67;}\n.kyn-badge--mint{background:var(--pastel-mint);color:#2F6B4F;}\n.kyn-badge--butter{background:var(--pastel-butter);color:#8A6D1F;}\n.kyn-badge--outline{background:transparent;border:1.5px solid var(--ink-100);color:var(--ink-700);}\n\n/* ---------- Input ---------- */\n.kyn-field{display:flex;flex-direction:column;gap:7px;font-family:var(--font-sans);}\n.kyn-field__label{font-size:13px;font-weight:var(--weight-semibold);color:var(--ink-900);}\n.kyn-field__hint{font-size:12px;color:var(--text-muted);}\n.kyn-input{\n  font-family:var(--font-sans);font-size:15px;color:var(--ink-900);\n  background:var(--paper);border:1.5px solid var(--sand);\n  border-radius:var(--radius-md);padding:13px 16px;width:100%;box-sizing:border-box;\n  transition:border-color var(--dur-fast) var(--ease-out),background var(--dur-fast) var(--ease-out),box-shadow var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out);\n}\n.kyn-input::placeholder{color:var(--ink-300);}\n.kyn-input:hover{border-color:var(--periwinkle-300);background:var(--white);}\n.kyn-input:focus{outline:none;border-color:var(--periwinkle-500);background:var(--white);box-shadow:var(--shadow-focus),var(--shadow-sm);transform:translateY(-1px);}\n.kyn-input--error{border-color:var(--danger);background:var(--white);}\n.kyn-input--error:focus{box-shadow:0 0 0 3px rgba(217,83,79,0.25),var(--shadow-sm);}\n\n/* input with a leading icon */\n.kyn-inputwrap{position:relative;display:flex;align-items:center;}\n.kyn-inputwrap__icon{position:absolute;left:15px;display:inline-flex;color:var(--ink-300);pointer-events:none;transition:color var(--dur-fast) var(--ease-out);}\n.kyn-inputwrap__icon svg{width:18px;height:18px;}\n.kyn-inputwrap--icon .kyn-input{padding-left:44px;}\n.kyn-inputwrap:focus-within .kyn-inputwrap__icon{color:var(--periwinkle-500);}\n\n/* ---------- Checkbox ---------- */\n.kyn-check{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-sans);font-size:15px;color:var(--ink-900);cursor:pointer;}\n.kyn-check input{pos  por una, los huecos de tu propia auditoría.<\u002Fp>\n    <div style=\"display: flex; flex-wrap: wrap; gap: 10px 22px; padding: 14px 18px; background: var(--oat); border-radius: var(--radius-md, 14px); border: 1px solid var(--border-on-oat);\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-700);\"><span style=\"width:34px;height:12px;border-radius:999px;background:linear-gradient(90deg,#E7B7B7,#C6E4D3,#A9B4E0);\"><\u002Fspan> Bandas = clasificación<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-700);\"><span style=\"width:3px;height:16px;background:var(--ink-900);border-radius:2px;\"><\u002Fspan> Marca = puntuación<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-700);\"><span style=\"width:16px;height:16px;border-radius:50%;background:var(--white);border:3px solid var(--periwinkle-600);\"><\u002Fspan> Deslizador = pruébalo tú<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--ink-700);\"><span style=\"width:14px;height:14px;border-radius:4px;background:var(--warning);\"><\u002Fspan> Etiqueta auditoría = hueco resuelto<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <nav style=\"position: sticky; top: 0; z-index: 30; background: rgba(251,250,247,.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-subtle); margin: 22px -24px 30px; padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;\">\n    <span style=\"font-size: .68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-500); margin-right: 4px;\">Ir a<\u002Fspan>\n    <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"7\">\n      <a href=\"#{{ c.id }}\" style=\"font-size: .82rem; font-weight: 800; padding: 6px 13px; border-radius: 999px; background: var(--white); border: 1px solid var(--border-subtle); color: var(--periwinkle-700);\">{{ c.sigla }}<\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <sc-for list=\"{{ cards }}\" as=\"card\" hint-placeholder-count=\"3\">\n    <article id=\"{{ card.id }}\" style=\"scroll-margin-top: 72px; background: var(--white); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg, 22px); box-shadow: var(--shadow-md, 0 10px 30px rgba(85,98,164,.12)); overflow: hidden; margin-bottom: 34px; animation: fadeUp .5s var(--ease-out, ease) both;\">\n\n      <div style=\"display: flex; align-items: flex-start; gap: 18px; padding: 24px 26px; background: linear-gradient(180deg, var(--periwinkle-50), var(--white)); border-bottom: 1px solid var(--border-subtle);\">\n        <div style=\"flex: 0 0 auto; width: 46px; height: 46px; border-radius: 14px; background: var(--periwinkle-500); color: var(--white); font-weight: 900; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm, 0 2px 8px rgba(85,98,164,.2));\">{{ card.num }}<\u002Fdiv>\n        <div style=\"flex: 1 1 auto; min-width: 0;\">\n          <div style=\"font-weight: 900; text-transform: uppercase; letter-spacing: -.01em; font-size: 1.9rem; line-height: 1; color: var(--ink-900);\">{{ card.sigla }}<\u002Fdiv>\n          <div style=\"font-size: .98rem; color: var(--ink-700); margin-top: 4px;\">{{ card.nombre }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 0 0 auto; text-align: right;\">\n          <div style=\"display: inline-block; font-size: .74rem; font-weight: 800; padding: 5px 11px; border-radius: 999px; background: var(--periwinkle-100); color: var(--periwinkle-800);\">{{ card.familia }}<\u002Fdiv>\n          <div style=\"font-size: .76rem; color: var(--ink-500); margin-top: 6px;\">{{ card.autor }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1.25fr .95fr; gap: 26px; padding: 24px 26px;\">\n        <div>\n          <div style=\"font-size: .72rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--periwinkle-600); margin-bottom: 8px;\">¿Qué evalúa?<\u002Fdiv>\n          <p style=\"font-size: 1.08rem; line-height: 1.55; color: var(--ink-900); margin: 0 0 16px; text-wrap: pretty;\">{{ card.evalua }}<\u002Fp>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n            <sc-for list=\"{{ card.construyes }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <span style=\"font-size: .8rem; font-weight: 600; padding: 6px 12px; border-radius: 999px; background: var(--periwinkle-50); border: 1px solid var(--periwinkle-100); color: var(--periwinkle-800);\">{{ k }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: .72rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--periwinkle-600); margin-bottom: 8px;\">Aplicación<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px;\">\n            <sc-for list=\"{{ card.aplicacion }}\" as=\"ap\" hint-placeholder-count=\"4\">\n              <span style=\"font-size: .78rem; font-weight: 700; padding: 5px 11px; border-radius: 8px; background: var({{ ap.bg }}); color: var(--ink-900);\">{{ ap.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size: .72rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--periwinkle-600); margin-bottom: 6px;\">Población · edad<\u002Fdiv>\n          <div style=\"font-size: .9rem; color: var(--ink-700); margin-bottom: 8px;\">{{ card.edadLabel }}<\u002Fdiv>\n          <div style=\"position: relative; height: 14px; border-radius: 999px; background: var(--oat); border: 1px solid var(--border-on-oat);\">\n            <div style=\"position: absolute; top: -1px; bottom: -1px; left: {{ card.edadFromPct }}%; width: {{ card.edadWidthPct }}%; border-radius: 999px; background: linear-gradient(90deg, var(--periwinkle-400), var(--periwinkle-600));\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position: relative; height: 16px; margin-top: 4px; font-size: .62rem; color: var(--ink-500);\">\n            <span style=\"position:absolute;left:0%;\">0<\u002Fspan>\n            <span style=\"position:absolute;left:25%;transform:translateX(-50%);\">~25<\u002Fspan>\n            <span style=\"position:absolute;left:50%;transform:translateX(-50%);\">~50<\u002Fspan>\n            <span style=\"position:absolute;left:75%;transform:translateX(-50%);\">~70<\u002Fspan>\n            <span style=\"position:absolute;right:0%;\">95 años<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 22px 26px; border-top: 1px solid var(--border-subtle); background: var(--periwinkle-50);\">\n        <div style=\"display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;\">\n          <div style=\"font-size: .8rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; color: var(--periwinkle-700);\">Resultado · {{ card.resultadoLabel }}<\u002Fdiv>\n          <div style=\"font-size: .84rem; color: var(--ink-500);\">{{ card.resultadoDetail }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ card.hasMeter }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <sc-if value=\"{{ card.showBell }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position: relative; height: 58px;\">\n                <svg sc-camel-view-box=\"0 0 300 90\" sc-camel-preserve-aspect-ratio=\"none\" style=\"width: 100%; height: 58px; display: block;\">\n                  <path d=\"M0 84 C 96 84, 118 12, 150 12 C 182 12, 204 84, 300 84\" fill=\"var(--periwinkle-100)\" stroke=\"var(--periwinkle-400)\" stroke-width=\"2\"><\u002Fpath>\n                <\u002Fsvg>\n                <div style=\"position: absolute; top: 0; bottom: 0; left: {{ card.markerPct }}%; width: 2px; background: var(--periwinkle-800); opacity: .8;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"position: relative; margin-top: 8px;\">\n              <div style=\"display: flex; height: 28px; border-radius: 999px; overflow: hidden; box-shadow: inset 0 0 0 1px var(--border-subtle);\">\n                <sc-for list=\"{{ card.bands }}\" as=\"b\" hint-placeholder-count=\"7\">\n                  <div style=\"flex: 0 0 {{ b.widthPct }}%; background: {{ b.color }}; display: flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; color: var(--ink-700); white-space: nowrap; overflow: hidden;\">{{ b.short }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"position: absolute; top: -7px; bottom: -7px; left: {{ card.markerPct }}%; width: 3px; background: var(--ink-900); border-radius: 2px;\"><\u002Fdiv>\n              <div style=\"position: absolute; top: -34px; left: {{ card.markerPct }}%; transform: translateX(-50%); background: var(--ink-900); color: var(--white); padding: 3px 10px; border-radius: 999px; font-size: .74rem; font-weight: 800; white-space: nowrap;\">{{ card.valueLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position: relative; height: 16px; margin-top: 8px;\">\n              <sc-for list=\"{{ card.anchors }}\" as=\"a2\" hint-placeholder-count=\"5\">\n                <span style=\"position: absolute; left: {{ a2.leftPct }}%; transform: translateX(-50%); font-size: .6rem; color: var(--ink-500); white-space: nowrap;\">{{ a2.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <input type=\"range\" class=\"kyn-range\" min=\"{{ card.min }}\" max=\"{{ card.max }}\" step=\"{{ card.step }}\" value=\"{{ card.value }}\" data-id=\"{{ card.id }}\" sc-camel-on-change=\"{{ onScore }}\" style=\"margin-top: 12px;\">\n            <div style=\"display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap;\">\n              <span style=\"background: {{ card.activeColor }}; color: var(--ink-900); font-weight: 800; padding: 5px 13px; border-radius: 999px; font-size: .84rem;\">{{ card.activeLabel }}<\u002Fspan>\n              <span style=\"color: var(--ink-700); font-size: .84rem;\">{{ card.derived }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size: .72rem; color: var(--ink-500); margin-top: 8px;\">Mueve el deslizador para ver en qué banda cae cada puntuación. <em>(demostrativo)<\u002Fem><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ card.isCompare }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display: grid; gap: 14px;\">\n            <div>\n              <div style=\"display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 5px;\"><span style=\"font-weight: 700;\">Vocabulario · inteligencia cristalizada<\u002Fspan><span style=\"color: var(--ink-500);\">{{ card.vocabPct }}<\u002Fspan><\u002Fdiv>\n              <div style=\"height: 18px; border-radius: 999px; background: var(--oat); overflow: hidden;\"><div style=\"height: 100%; width: {{ card.vocabPct }}%; background: linear-gradient(90deg, var(--periwinkle-400), var(--periwinkle-600));\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 5px;\"><span style=\"font-weight: 700;\">Abstracción · inteligencia fluida<\u002Fspan><span style=\"color: var(--ink-500);\">{{ card.abstrPct }}<\u002Fspan><\u002Fdiv>\n              <div style=\"height: 18px; border-radius: 999px; background: var(--oat); overflow: hidden;\"><div style=\"height: 100%; width: {{ card.abstrPct }}%; background: linear-gradient(90deg, var(--pastel-peach), var(--pop-magenta));\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <input type=\"range\" class=\"kyn-range\" min=\"{{ card.min }}\" max=\"{{ card.max }}\" step=\"{{ card.step }}\" value=\"{{ card.value }}\" data-id=\"{{ card.id }}\" sc-camel-on-change=\"{{ onScore }}\">\n            <div style=\"font-size: .72rem; color: var(--ink-500); margin-top: -4px;\">Simula un mayor deterioro deslizando a la derecha → la abstracción cae y la brecha crece.<\u002Fdiv>\n            <div style=\"border-left: 5px solid {{ card.brechaColor }}; background: var(--oat); border-radius: 8px; padding: 12px 14px; font-size: .9rem; color: var(--ink-900);\"><strong>{{ card.valueLabel }}<\u002Fstrong> — {{ card.brechaVerdict }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; padding: 22px 26px 26px;\">\n        <div style=\"background: var(--periwinkle-50); border-radius: var(--radius-md, 14px); padding: 15px 16px;\">\n          <div style=\"font-size: .7rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--periwinkle-700); margin-bottom: 7px;\">Cómo se lee<\u002Fdiv>\n          <p style=\"margin: 0; font-size: .92rem; line-height: 1.5; color: var(--ink-700); text-wrap: pretty;\">{{ card.interpreta }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #EAF4EE; border-radius: var(--radius-md, 14px); padding: 15px 16px;\">\n          <div style=\"font-size: .7rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #3B7C5B; margin-bottom: 7px;\">Clave para recordar<\u002Fdiv>\n          <p style=\"margin: 0; font-size: .92rem; line-height: 1.5; color: var(--ink-700); text-wrap: pretty;\">{{ card.tip }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-left: 5px solid var(--pop-magenta); background: var(--pop-magenta-soft); border-radius: var(--radius-md, 14px); padding: 15px 16px;\">\n          <div style=\"font-size: .7rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #B03B78; margin-bottom: 7px;\">Tip de examen<\u002Fdiv>\n          <p style=\"margin: 0; font-size: .92rem; line-height: 1.5; color: var(--ink-900); text-wrap: pretty;\">{{ card.examTip }}<\u002Fp>\n        <\u002Fdiv>\n        <sc-if value=\"{{ card.showAudit }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"border-left: 5px solid {{ card.huecoBar }}; background: {{ card.huecoBg }}; border-radius: var(--radius-md, 14px); padding: 15px 16px;\">\n            <div style=\"font-size: .7rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-700); margin-bottom: 7px;\">{{ card.huecoTag }}<\u002Fdiv>\n            <p style=\"margin: 0; font-size: .92rem; line-height: 1.5; color: var(--ink-900); text-wrap: pretty;\">{{ card.hueco }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Farticle>\n  <\u002Fsc-for>\n\n  <footer style=\"text-align: center; color: var(--ink-500); font-size: .82rem; padding-top: 26px; line-height: 1.6;\">\n    Categoría 1 de 10 · <strong style=\"color: var(--ink-700);\">Inteligencia<\u002Fstrong> (7 pruebas).<br>\n    Siguen: neuropsicológicas · proyectivas · ansiedad · depresión · personalidad · calidad de vida · funcionalidad · desarrollo · vocacional.\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showAudit&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Contenido&quot; },\n  &quot;showCurve&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Visualizaci\\u00f3n&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { sliders: { WPPSI: 105, WISC: 100, WAIS: 112, Raven: 50, RIAS: 100, Shipley: 12, Beta: 100 } };\n\n  onScore = (e) => {\n    const id = e.target.dataset.id;\n    const v = Number(e.target.value);\n    this.setState((s) => ({ sliders: { ...s.sliders, [id]: v } }));\n  };\n\n  cdf(z) {\n    const t = 1 / (1 + 0.2316419 * Math.abs(z));\n    const d = 0.3989423 * Math.exp(-z * z / 2);\n    const p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));\n    const r = z > 0 ? 1 - p : p;\n    return Math.min(0.999, Math.max(0.001, r));\n  }\n\n  ciBands() {\n    return [\n      [40, 70, 'Extremadamente bajo (\\u226469)', 'Ext. bajo', '#E7B7B7'],\n      [70, 80, 'Lim\\u00edtrofe (70\\u201379)', 'Lim\\u00edt.', '#F0CDA6'],\n      [80, 90, 'Medio bajo (80\\u201389)', 'Medio bajo', '#F3E3AE'],\n      [90, 110, 'Promedio (90\\u2013109)', 'Promedio', '#C6E4D3'],\n      [110, 120, 'Medio alto (110\\u2013119)', 'Medio alto', '#CADCF0'],\n      [120, 130, 'Superior (120\\u2013129)', 'Superior', '#BFC8E9'],\n      [130, 160, 'Muy superior (\\u2265130)', 'Muy sup.', '#A9B4E0'],\n    ].map((b) => ({ from: b[0], to: b[1], label: b[2], short: b[3], color: b[4], widthPct: (b[1] - b[0]) / 120 * 100 }));\n  }\n\n  pctBands() {\n    return [\n      [0, 5, 'Grado V \\u00b7 Deficiente (Pc \\u22645)', 'V', '#E7B7B7'],\n      [5, 25, 'Grado IV \\u00b7 Inferior al t\\u00e9rmino medio (Pc 6\\u201324)', 'IV', '#F0CDA6'],\n      [25, 75, 'Grado III \\u00b7 T\\u00e9rmino medio (Pc 25\\u201374)', 'III', '#C6E4D3'],\n      [75, 95, 'Grado II \\u00b7 Superior al t\\u00e9rmino medio (Pc 75\\u201394)', 'II', '#CADCF0'],\n      [95, 101, 'Grado I \\u00b7 Superior (Pc \\u226595)', 'I', '#A9B4E0'],\n    ].map((b) => ({ from: b[0], to: b[1], label: b[2], short: b[3], color: b[4], widthPct: (Math.min(b[1], 100) - b[0]) / 100 * 100 }));\n  }\n\n  apBg(label) {\n    const m = { 'Individual': '--pastel-sky', 'Colectiva': '--pastel-butter', 'Heteroaplicada': '--pastel-lilac', 'Autoaplicable': '--pastel-mint', 'Verbal': '--periwinkle-100', 'No verbal': '--pastel-peach', 'Manipulativa': '--pastel-blush', 'Papel y l\\u00e1piz': '--oat' };\n    return m[label] || '--periwinkle-50';\n  }\n\n  defs() {\n    return [\n      {\n        id: 'WPPSI', sigla: 'WPPSI-IV', nombre: 'Wechsler Preschool and Primary Scale of Intelligence', autor: 'D. Wechsler', familia: 'Familia Wechsler', type: 'ci',\n        edadFrom: 2.5, edadTo: 7.6, edadLabel: '2:6 \\u2013 7:7 a\\u00f1os (preescolar)',\n        evalua: 'La inteligencia general en la primera infancia, cuando el ni\\u00f1o a\\u00fan no lee ni escribe: se apoya en material manipulativo y en el juego.',\n        construyes: ['CI Total', 'Comprensi\\u00f3n verbal', 'Viso-espacial', 'Razonamiento fluido', 'Memoria de trabajo', 'Velocidad de procesamiento'],\n        aplicacion: ['Individual', 'Heteroaplicada', 'Verbal', 'Manipulativa'],\n        resultadoLabel: 'CI (media 100 \\u00b7 DE 15)', resultadoDetail: 'CI Total + \\u00edndices, todos en m\\u00e9trica 100/15.',\n        interpreta: 'Se lee por bandas de CI. Los cortes clave caen en \\u00b11 y \\u00b12 desviaciones est\\u00e1ndar: 70 \\u00b7 85 \\u00b7 100 \\u00b7 115 \\u00b7 130.',\n        tip: 'WPPSI = la Wechsler de los peques (PreSchool). Ordena la familia por edad: WPPSI \\u2192 WISC \\u2192 WAIS.',\n        hueco: 'En tu cat\\u00e1logo visual solo aparec\\u00eda el rango de edad suelto, sin ficha propia. Aqu\\u00ed queda completa.', huecoKind: 'fill',\n      },\n      {\n        id: 'WISC', sigla: 'WISC-V', nombre: 'Wechsler Intelligence Scale for Children', autor: 'D. Wechsler', familia: 'Familia Wechsler', type: 'ci',\n        edadFrom: 6, edadTo: 16.99, edadLabel: '6 \\u2013 16:11 a\\u00f1os (edad escolar)',\n        evalua: 'La inteligencia en edad escolar, desglosada en \\u00edndices que muestran el PERFIL del ni\\u00f1o, no solo un n\\u00famero global.',\n        construyes: ['CI Total', 'WISC-IV: 4 \\u00edndices \\u2014 ICV \\u00b7 IRP \\u00b7 IMT \\u00b7 IVP', 'WISC-V: 5 \\u00edndices (separa viso-espacial y razonamiento fluido)'],\n        aplicacion: ['Individual', 'Heteroaplicada', 'Verbal', 'Manipulativa'],\n        resultadoLabel: 'CI (media 100 \\u00b7 DE 15)', resultadoDetail: 'CI Total + \\u00edndices factoriales.',\n        interpreta: 'Bandas de CI. Si los \\u00edndices est\\u00e1n muy dispersos entre s\\u00ed, el CI Total pierde sentido y se usan \\u00edndices alternativos ICG/ICC (enfoque Flanagan-Kaufman).',\n        tip: 'Los 4 \\u00edndices del WISC-IV: ICV \\u00b7 IRP \\u00b7 IMT \\u00b7 IVP (comprensi\\u00f3n verbal, razonamiento perceptual, memoria de trabajo, velocidad).',\n        hueco: 'Ficha completa en tu cat\\u00e1logo (edad, \\u00edndices y regla de dispersi\\u00f3n).', huecoKind: 'ok',\n      },\n      {\n        id: 'WAIS', sigla: 'WAIS-IV', nombre: 'Wechsler Adult Intelligence Scale', autor: 'D. Wechsler', familia: 'Familia Wechsler', type: 'ci',\n        edadFrom: 16, edadTo: 90, edadLabel: '16 \\u2013 90 a\\u00f1os (adultos)',\n        evalua: 'La inteligencia adulta. Misma l\\u00f3gica y m\\u00e9trica que el WISC, pero con normas para adultos y adultos mayores.',\n        construyes: ['CI Total', 'ICV \\u2014 comprensi\\u00f3n verbal', 'IRP \\u2014 razonamiento perceptual', 'IMT \\u2014 memoria de trabajo', 'IVP \\u2014 velocidad de procesamiento'],\n        aplicacion: ['Individual', 'Heteroaplicada', 'Verbal', 'Manipulativa'],\n        resultadoLabel: 'CI (media 100 \\u00b7 DE 15)', resultadoDetail: 'CI Total + 4 \\u00edndices.',\n        interpreta: 'Bandas de CI id\\u00e9nticas a las del WISC. Sirve tambi\\u00e9n como l\\u00ednea base en la evaluaci\\u00f3n de deterioro.',\n        tip: 'WAIS = Adult. Misma m\\u00e9trica que WISC (100/15); cambia la poblaci\\u00f3n: 16 a 90 a\\u00f1os.',\n        hueco: 'Tu cat\\u00e1logo solo dec\\u00eda \\u201cmisma familia que WISC\\u201d sin listar \\u00edndices. Aqu\\u00ed van los 4: ICV \\u00b7 IRP \\u00b7 IMT \\u00b7 IVP.', huecoKind: 'fill',\n      },\n      {\n        id: 'Raven', sigla: 'Raven', nombre: 'Matrices Progresivas de Raven', autor: 'J. C. Raven', : ['CI no verbal', 'Razonamiento perceptual y velocidad'],\n        aplicacion: ['Colectiva', 'No verbal', 'Papel y l\\u00e1piz'],\n        resultadoLabel: 'CI no verbal (media 100 \\u00b7 DE 15)', resultadoDetail: 'Screening r\\u00e1pido y aplicable en grupo.',\n        interpreta: 'Se lee con bandas de CI (100/15). Pensada m\\u00e1s para cribado que para diagn\\u00f3stico fino.',\n        tip: 'Beta = el \\u201cno verbal grupal\\u201d por excelencia (selecci\\u00f3n laboral, contextos con baja escolaridad).',\n        hueco: 'El tipo de puntaje no aparec\\u00eda en ning\\u00fan lado. Resuelto: es un CI no verbal (media 100, DE 15).', huecoKind: 'fill',\n      },\n    ];\n  }\n\n  buildCard(d, i, showCurve, showAudit) {\n    const value = this.state.sliders[d.id];\n    const c = Object.assign({}, d);\n    c.num = i + 1;\n    c.value = value;\n    c.examTip = ({\n      WPPSI: 'En el reactivo: “preescolar / 2 a 7 años / aún no lee” → WPPSI. Si el caso es escolar (≥6), salta a WISC.',\n      WISC: 'Palabras gancho: “niño escolar 6–16” + “perfil / índices”. Si hay mucha dispersión entre índices, la clave menciona ICG/ICC.',\n      WAIS: 'Distractor típico: confundirla con el WISC. Regla: ≥16 años = WAIS. Comparte los 4 índices; lo que cambia es la población.',\n      Raven: 'Si el caso dice “no habla español / sordera / analfabetismo / libre de cultura / no verbal” → casi siempre es Raven.',\n      RIAS: 'Gancho: “breve / rápido” + “verbal y no verbal” con métrica CI. Si piden batería completa, es Wechsler, no RIAS.',\n      Shipley: 'Gancho: “deterioro” + contraste “vocabulario vs. abstracción”. Recuerda: la fluida (abstracción) cae primero.',\n      Beta: 'Gancho: “grupal / masivo / selección de personal” + no verbal → Beta. Si la aplicación es individual, NO es Beta.',\n    })[d.id];\n    c.showAudit = showAudit;\n    c.edadFromPct = d.edadFrom / 95 * 100;\n    c.edadWidthPct = Math.min(100 - c.edadFromPct, (d.edadTo - d.edadFrom) / 95 * 100);\n    c.aplicacion = d.aplicacion.map((l) => ({ label: l, bg: this.apBg(l) }));\n    if (d.huecoKind === 'ok') { c.huecoTag = 'Ficha completa'; c.huecoBg = '#E7F2EA'; c.huecoBar = 'var(--success)'; }\n    else { c.huecoTag = 'Tu auditor\\u00eda \\u00b7 resuelto'; c.huecoBg = '#FBF1DA'; c.huecoBar = 'var(--warning)'; }\n    c.isCi = false; c.isPct = false; c.isCompare = false; c.hasMeter = false; c.showBell = false;\n\n    if (d.type === 'ci') {\n      const min = 40, max = 160;\n      c.min = min; c.max = max; c.step = 1;\n      c.bands = this.ciBands();\n      c.anchors = [[70, '\\u22122DE'], [85, '\\u22121DE'], [100, 'media'], [115, '+1DE'], [130, '+2DE']].map((a) => ({ label: a[1], leftPct: (a[0] - min) / (max - min) * 100 }));\n      c.markerPct = Math.max(0, Math.min(100, (value - min) / (max - min) * 100));\n      const b = c.bands.find((x) => value >= x.from && value < x.to) || c.bands[c.bands.length - 1];\n      c.activeLabel = b.label; c.activeColor = b.color;\n      const z = (value - 100) / 15, pct = Math.round(this.cdf(z) * 100), T = Math.round(50 + 10 * z);\n      c.valueLabel = String(value);\n      c.derived = 'Percentil ~' + pct + ' \\u00b7 puntuaci\\u00f3n T \\u2248 ' + T + ' \\u00b7 z = ' + z.toFixed(2);\n      c.isCi = true; c.hasMeter = true; c.showBell = showCurve;\n    } else if (d.type === 'percentile') {\n      const min = 0, max = 100;\n      c.min = min; c.max = max; c.step = 1;\n      c.bands = this.pctBands();\n      c.anchors = [5, 25, 50, 75, 95].map((v) => ({ label: 'Pc ' + v, leftPct: v }));\n      c.markerPct = value;\n      const b = c.bands.find((x) => value >= x.from && value < x.to) || c.bands[c.bands.length - 1];\n      c.activeLabel = b.label; c.activeColor = b.color;\n      c.valueLabel = 'Pc ' + value;\n      c.derived = 'Supera aproximadamente al ' + value + '% de su grupo normativo.';\n      c.isPct = true; c.hasMeter = true;\n    } else if (d.type === 'compare') {\n      c.min = 0; c.max = 100; c.step = 1;\n      const vocab = 88, abstr = Math.max(22, 92 - value), brecha = Math.round(vocab - abstr);\n      c.vocabPct = vocab; c.abstrPct = abstr; c.brecha = brecha;\n      if (brecha >= 22) { c.brechaVerdict = 'Brecha amplia \\u2192 posible deterioro'; c.brechaColor = 'var(--danger)'; }\n      else if (brecha >= 12) { c.brechaVerdict = 'Brecha moderada \\u2192 conviene vigilar'; c.brechaColor = 'var(--warning)'; }\n      else { c.brechaVerdict = 'Brecha peque\\u00f1a \\u2192 dentro de lo esperable'; c.brechaColor = 'var(--success)'; }\n      c.valueLabel = 'Brecha ' + brecha + ' pts';\n      c.isCompare = true;\n    }\n    return c;\n  }\n\n  renderVals() {\n    const showAudit = this.props.showAudit ?? true;\n    const showCurve = this.props.showCurve ?? true;\n    const cards = this.defs().map((d, i) => this.buildCard(d, i, showCurve, showAudit));\n    return { cards, onScore: this.onScore };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
