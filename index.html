<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paulette C | Systems Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header glass">
      <a class="brand-mark" href="#hero">
        <span class="brand-mark__text">Paulette C</span>
        <svg class="brand-mark__icon" viewBox="0 0 32 28" width="17" height="15" aria-hidden="true">
          <path d="M16 25.5C9.4 20 3.4 15 2.7 9.8 2.1 5.4 5.2 2.6 8.6 3.1c3 .4 5.4 2.7 7.4 5.4 2-2.7 4.4-5 7.4-5.4 3.4-.5 6.5 2.3 5.9 6.7C28.6 15 22.6 20 16 25.5Z" fill="none" stroke="#E85DA0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <nav class="site-nav" aria-label="Sections">
        <a href="#about" id="nav-about"></a>
        <a href="#skills" id="nav-skills"></a>
        <a href="#projects" id="nav-projects"></a>
        <a href="#now" id="nav-now"></a>
        <a href="#contact" id="nav-contact"></a>
      </nav>
      <div class="lang-controls">
        <label for="language-select" class="sr-only" id="language-label">Language selector</label>
        <select id="language-select" class="lang-select">
          <option value="en">EN</option>
          <option value="es">ES</option>
          <option value="fr">FR</option>
          <option value="pt">PT</option>
          <option value="de">DE</option>
        </select>
      </div>
    </header>

    <main>
      <section id="hero" class="hero-section">
        <div class="hero-text">
          <p class="hero-eyebrow" id="hero-eyebrow"></p>
          <h1 class="hero-headline">
            <span class="hero-headline__a" id="headline-a"></span>
            <span class="hero-headline__b" id="headline-b"></span>
          </h1>
          <p class="hero-intro" id="hero-intro"></p>
          <div class="hero-ctas">
            <a href="#projects" class="kyn-btn kyn-btn--primary kyn-btn--lg" id="cta-projects"></a>
            <a href="#contact" class="kyn-btn kyn-btn--secondary kyn-btn--lg" id="cta-contact"></a>
          </div>
        </div>
        <div class="hero-photo">
          <div class="hero-photo__blob" aria-hidden="true"></div>
          <div class="hero-photo__frame">
            <img src="assets/paulette.png" alt="Paulette con Kenna" onerror="this.onerror=null;this.src='https://placehold.co/720x960/f8eef1/8e1d48?text=Photo+Coming+Soon';" />
          </div>
          <span class="hero-photo__sticker" id="hero-spark"></span>
          <span class="hero-photo__heart" aria-hidden="true">
            <svg viewBox="0 0 32 28" width="34" height="30" aria-hidden="true"><path d="M16 25.5C9.4 20 3.4 15 2.7 9.8 2.1 5.4 5.2 2.6 8.6 3.1c3 .4 5.4 2.7 7.4 5.4 2-2.7 4.4-5 7.4-5.4 3.4-.5 6.5 2.3 5.9 6.7C28.6 15 22.6 20 16 25.5Z" fill="#E85DA0" opacity="0.9" /></svg>
          </span>
        </div>
      </section>

      <div class="marquee" aria-hidden="true">
        <div class="marquee__track" id="marquee-track"></div>
      </div>

      <section id="about" class="section-about">
        <div class="about-copy" data-reveal>
          <p class="section-kicker">01</p>
          <h2 class="section-title" id="about-title-wrap">
            <span id="about-title"></span> <span class="section-title__spark" id="about-spark"></span>
          </h2>
          <div class="about-paragraphs">
            <p class="about-paragraphs__lead" id="about-p1"></p>
            <p id="about-p2"></p>
            <p id="about-p3"></p>
            <p id="about-p4"></p>
          </div>
        </div>
        <aside class="about-experience" data-reveal>
          <h3 id="exp-title"></h3>
          <div class="exp-list" id="exp-list"></div>
        </aside>
      </section>

      <section id="skills" class="section-skills">
        <div class="section-inner">
          <div data-reveal>
            <p class="section-kicker">02</p>
            <h2 class="section-title" id="skills-title"></h2>
          </div>
          <div class="skills-grid" id="skills-grid"></div>
        </div>
      </section>

      <section id="projects" class="section-projects">
        <div class="projects-head" data-reveal>
          <div>
            <p class="section-kicker">03</p>
            <h2 class="section-title" id="projects-title"></h2>
          </div>
          <span class="kyn-badge kyn-badge--pop" id="projects-pill"></span>
        </div>
        <p class="projects-note" id="projects-note" data-reveal></p>
        <div class="projects-grid" id="project-list" aria-live="polite"></div>
      </section>

      <section id="now" class="section-now">
        <div class="now-card" data-reveal>
          <div class="now-head">
            <h2 id="now-title"></h2>
            <span class="now-year" id="now-year"></span>
          </div>
          <p class="now-note" id="now-note"></p>
          <div class="now-grid" id="now-grid"></div>
        </div>
      </section>

      <section id="contact" class="section-contact">
        <div class="contact-inner" data-reveal>
          <svg viewBox="0 0 32 28" width="30" height="26" aria-hidden="true"><path d="M16 25.5C9.4 20 3.4 15 2.7 9.8 2.1 5.4 5.2 2.6 8.6 3.1c3 .4 5.4 2.7 7.4 5.4 2-2.7 4.4-5 7.4-5.4 3.4-.5 6.5 2.3 5.9 6.7C28.6 15 22.6 20 16 25.5Z" fill="#E85DA0" /></svg>
          <h2 id="contact-title"></h2>
          <p id="contact-copy"></p>
          <a class="kyn-btn kyn-btn--primary kyn-btn--lg contact-instagram" href="https://instagram.com/paulettecb" target="_blank" rel="noreferrer" aria-label="@paulettecb">@aulettec</a>
          <p class="small-note" id="contact-note"></p>
        </div>
        <footer class="site-footer">
          <p id="footer-note"></p>
        </footer>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
